# ══════════════════════════════════════════
#  Quant AI Agent — Redis Configuration
# ══════════════════════════════════════════

# ── Memory ──
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Persistence (minimal — we use Redis primarily as cache) ──
save 900 1
save 300 10
save 60 10000

# ── Networking ──
bind 0.0.0.0
protected-mode no
tcp-keepalive 300
timeout 0

# ── Pub/Sub (for live market data broadcast) ──
# No special config needed — pub/sub works out of the box
# Channels used:
#   market:nifty     — live Nifty 50 quotes
#   market:banknifty — live BankNifty quotes
#   market:options   — options chain updates

# ── Logging ──
loglevel notice
