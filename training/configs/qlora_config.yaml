model:
  base: "mistralai/Mistral-7B-Instruct-v0.3"
  quantization: "4bit"
  bnb_4bit_compute_dtype: "bfloat16"
lora:
  r: 64
  alpha: 128
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
training:
  epochs: 3
  batch_size: 4
  gradient_accumulation: 4
  learning_rate: 2e-4
  warmup_ratio: 0.03
  max_seq_length: 2048
  optimizer: "paged_adamw_8bit"
