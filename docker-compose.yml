version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: quant_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quant_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant_password}
      POSTGRES_DB: ${POSTGRES_DB:-quant_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - quant_network

  redis:
    image: redis:7-alpine
    container_name: quant_redis
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    restart: unless-stopped
    networks:
      - quant_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: quant_qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
      - ./infra/qdrant/config.yaml:/qdrant/config/custom_config.yaml
    environment:
      QDRANT__CONFIG_PATH: /qdrant/config/custom_config.yaml
    restart: unless-stopped
    networks:
      - quant_network

  ollama:
    image: ollama/ollama:latest
    container_name: quant_ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - quant_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quant_backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-quant_user}:${POSTGRES_PASSWORD:-quant_password}@postgres:5432/${POSTGRES_DB:-quant_db}
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
      - qdrant
      - ollama
    restart: unless-stopped
    networks:
      - quant_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quant_frontend
    ports:
      - "${FRONTEND_PORT:-5075}:5075" # Using 5075 as requested
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:${BACKEND_PORT:-8000}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - quant_network

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:

networks:
  quant_network:
    driver: bridge
